<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Tarjetas OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        #scanner-container { position: relative; width: 100%; max-width: 400px; height: 250px; background: #000; overflow: hidden; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Guía visual para la tarjeta */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid rgba(255,255,255,0.5); box-sizing: border-box;
            display: flex; justify-content: center; align-items: center;
        }
        #focus-area {
            width: 80%; height: 50px; border: 2px solid #00ff00;
            border-radius: 5px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
        }

        .controls { margin-top: 20px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; font-size: 1.2rem; text-align: center; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        button:active { background: #0056b3; }
        #status { font-size: 0.9rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Escáner de Tarjeta</h2>
    
    <div id="scanner-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="overlay">
            <div id="focus-area"></div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="card-number" placeholder="Número detectado" readonly>
        <button onclick="copyToClipboard()">Copiar Número</button>
        <p id="status">Iniciando cámara...</p>
    </div>

    <!-- Canvas oculto para procesar la imagen -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cardNumberInput = document.getElementById('card-number');
        const status = document.getElementById('status');

        // Configurar la cámara
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                status.innerText = "Escaneando... Alinea el número en el recuadro";
                
                // Iniciar el ciclo de detección
                setInterval(captureAndRecognize, 2000); // Escanea cada 2 segundos
            } catch (err) {
                status.innerText = "Error al acceder a la cámara: " + err.message;
            }
        }

        async function captureAndRecognize() {
            const context = canvas.getContext('2d');
            // Ajustar tamaño del canvas al video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Dibujar el frame actual en el canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Tesseract OCR
            status.innerText = "Procesando...";
            
            Tesseract.recognize(
                canvas,
                'eng', // Usamos inglés porque los números son universales
                { logger: m => {} } 
            ).then(({ data: { text } }) => {
                // Limpiar el texto buscando solo grupos de 16 dígitos
                const cleanedText = text.replace(/\s/g, ''); // Quitar espacios
                const cardMatch = cleanedText.match(/\d{16}/); // Buscar 16 números seguidos

                if (cardMatch) {
                    cardNumberInput.value = cardMatch[0];
                    status.innerText = "¡Número detectado!";
                    // Opcional: vibrar al detectar
                    if (navigator.vibrate) navigator.vibrate(200);
                } else {
                    status.innerText = "Buscando números...";
                }
            });
        }

        function copyToClipboard() {
            if (cardNumberInput.value) {
                cardNumberInput.select();
                document.execCommand('copy');
                alert("¡Copiado al portapapeles!");
            } else {
                alert("No hay número para copiar");
            }
        }

        // Iniciar
        setupCamera();
    </script>
</body>
</html>
