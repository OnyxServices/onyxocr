<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lector de Tarjetas Pro</title>
    <!-- Usamos la versión 5 de Tesseract -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; touch-action: manipulation; }
        
        #container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1.58 / 1; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Guía de enfoque */
        #guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 20%; border: 2px solid #00ff88; border-radius: 5px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); z-index: 10;
        }

        .ui { width: 100%; max-width: 400px; margin-top: 20px; }
        input { 
            width: 100%; padding: 15px; font-size: 1.4rem; background: #222; border: 1px solid #444; 
            color: #00ff88; border-radius: 10px; text-align: center; margin-bottom: 10px; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 15px; background: #00ff88; color: black; font-weight: bold; 
            border: none; border-radius: 10px; cursor: pointer; font-size: 1rem;
        }
        #status { font-size: 0.8rem; color: #888; margin-top: 10px; text-align: center; }
        canvas { display: none; } /* Canvas oculto para procesar */
    </style>
</head>
<body>

    <h3>Escanear Tarjeta</h3>
    
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <div id="guide"></div>
    </div>

    <div class="ui">
        <input type="text" id="result" placeholder="Esperando número..." readonly>
        <button id="copyBtn">COPIAR NÚMERO</button>
        <div id="status">Cargando cámara y OCR...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultInput = document.getElementById('result');
        const status = document.getElementById('status');
        const copyBtn = document.getElementById('copyBtn');

        let worker = null;
        let isProcessing = false;

        // 1. Inicializar Tesseract (Versión 5)
        async function initOCR() {
            try {
                status.innerText = "Configurando motor de IA...";
                worker = await Tesseract.createWorker('eng', 1, {
                    logger: m => console.log(m.status)
                });
                
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789',
                    tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
                });

                status.innerText = "Motor listo. Iniciando cámara...";
                startCamera();
            } catch (e) {
                status.innerText = "Error OCR: " + e.message;
            }
        }

        // 2. Iniciar Cámara con máxima resolución posible
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    status.innerText = "Escaneando... Alinee los números";
                    setInterval(captureFrame, 1000); // Intenta leer cada 1 segundo
                };
            } catch (e) {
                status.innerText = "Error Cámara: " + e.message;
            }
        }

        // 3. Capturar y procesar frame
        async function captureFrame() {
            if (isProcessing || !worker) return;
            isProcessing = true;

            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // Ajustamos el canvas al tamaño real del video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Definimos el área de recorte (donde está el cuadro verde)
            const rw = canvas.width * 0.8;
            const rh = canvas.height * 0.2;
            const rx = (canvas.width - rw) / 2;
            const ry = (canvas.height - rh) / 2;

            // Dibujamos solo esa parte en el canvas
            ctx.drawImage(video, rx, ry, rw, rh, 0, 0, rw, rh);

            // Aplicar contraste básico para mejorar lectura
            let imgData = ctx.getImageData(0, 0, rw, rh);
            let data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                let brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                let v = (brightness > 125) ? 255 : 0; // Blanco y negro puro
                data[i] = data[i+1] = data[i+2] = v;
            }
            ctx.putImageData(imgData, 0, 0);

            try {
                // Realizar OCR solo sobre el recorte
                const { data: { text } } = await worker.recognize(canvas);
                const digits = text.replace(/\D/g, '');

                if (digits.length >= 15 && digits.length <= 16) {
                    if (luhnCheck(digits)) {
                        resultInput.value = digits;
                        status.innerText = "¡Tarjeta detectada!";
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                }
            } catch (e) {
                console.error(e);
            }

            isProcessing = false;
        }

        // 4. Validación Matemática (Luhn)
        function luhnCheck(val) {
            let sum = 0;
            for (let i = 0; i < val.length; i++) {
                let intVal = parseInt(val.substr(i, 1));
                if (i % 2 == val.length % 2) {
                    intVal *= 2;
                    if (intVal > 9) intVal = (intVal % 10) + 1;
                }
                sum += intVal;
            }
            return (sum % 10) == 0;
        }

        // 5. Botón Copiar
        copyBtn.onclick = () => {
            if (resultInput.value) {
                navigator.clipboard.writeText(resultInput.value);
                alert("Copiado: " + resultInput.value);
            }
        };

        // Iniciar todo
        initOCR();
    </script>
</body>
</html>
