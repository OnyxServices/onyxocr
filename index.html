<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Editor La Liga</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px;}
    th, td { border: 1px solid #ccc; padding: 6px; text-align: center;}
    input { width: 60px; text-align: center;}
    .status { margin-top: 10px; font-weight: bold;}
  </style>
</head>
<body>

<h2>Gestión La Liga</h2>

<label>Filtrar por Jornada:</label>
<input type="number" id="jornadaInput">
<button onclick="cargarDatos()">Cargar</button>

<div class="status" id="status"></div>

<table id="tabla">
  <thead>
    <tr>
      <th>Local</th>
      <th>Visitante</th>
      <th>GL</th>
      <th>GV</th>
      <th>Pos L</th>
      <th>Pos V</th>
      <th>Rem L</th>
      <th>Rem V</th>
      <th>Pases L</th>
      <th>Pases V</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const SUPABASE_URL = "https://fkbosmuymcluedxcgwzs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYm9zbXV5bWNsdWVkeGNnd3pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNjAyNjAsImV4cCI6MjA4NzczNjI2MH0.Q8Aw7GkFjti1OU9gaawAPuRITy06nEusveci9nRPG6Y";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let cambiosPendientes = {};

async function cargarDatos() {
  const jornada = document.getElementById("jornadaInput").value;

  const { data, error } = await supabase
    .from("la_liga")
    .select("*")
    .eq("jornada", jornada)
    .order("fecha_utc", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";

  data.forEach(partido => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${partido.equipo_local}</td>
      <td>${partido.equipo_visitante}</td>
      <td><input value="${partido.goles_local ?? ''}" onchange="marcarCambio(${partido.id}, 'goles_local', this.value)"></td>
      <td><input value="${partido.goles_visitante ?? ''}" onchange="marcarCambio(${partido.id}, 'goles_visitante', this.value)"></td>
      <td><input value="${partido.posesion_local ?? ''}" onchange="marcarCambio(${partido.id}, 'posesion_local', this.value)"></td>
      <td><input value="${partido.posesion_visitante ?? ''}" onchange="marcarCambio(${partido.id}, 'posesion_visitante', this.value)"></td>
      <td><input value="${partido.remates_puerta_local ?? ''}" onchange="marcarCambio(${partido.id}, 'remates_puerta_local', this.value)"></td>
      <td><input value="${partido.remates_puerta_visitante ?? ''}" onchange="marcarCambio(${partido.id}, 'remates_puerta_visitante', this.value)"></td>
      <td><input value="${partido.pases_completados_local ?? ''}" onchange="marcarCambio(${partido.id}, 'pases_completados_local', this.value)"></td>
      <td><input value="${partido.pases_completados_visitante ?? ''}" onchange="marcarCambio(${partido.id}, 'pases_completados_visitante', this.value)"></td>
    `;

    tbody.appendChild(row);
  });
}

function marcarCambio(id, campo, valor) {
  if (!cambiosPendientes[id]) {
    cambiosPendientes[id] = {};
  }
  cambiosPendientes[id][campo] = valor === "" ? null : parseInt(valor);
}

async function guardarCambios() {
  if (Object.keys(cambiosPendientes).length === 0) return;

  document.getElementById("status").innerText = "Guardando...";

  for (const id in cambiosPendientes) {
    await supabase
      .from("la_liga")
      .update(cambiosPendientes[id])
      .eq("id", id);
  }

  cambiosPendientes = {};
  document.getElementById("status").innerText = "Guardado automático ✔";
}

setInterval(guardarCambios, 10000);
</script>

</body>
</html>
